<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ONUS PromptLab">
<meta name="theme-color" content="#0a0e1a">
<title>ONUS PromptLab v2</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0a0e1a;--bg2:#111827;--gold:#D4AF37;--gold-dim:rgba(212,175,55,0.12);--gold-b:rgba(212,175,55,0.25);--tx:#e0e6ed;--tx2:#8899aa;--tx3:#556677;--bd:rgba(255,255,255,0.07);--card:rgba(255,255,255,0.03);--fn:'DM Sans',system-ui,sans-serif;--mo:'JetBrains Mono','Fira Code',monospace;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);--green:#2ecc71;--red:#e74c3c;--blue:#3498db;}
body{font-family:var(--fn);background:linear-gradient(145deg,var(--bg),var(--bg2),#0d1117);color:var(--tx);min-height:100dvh;overflow-x:hidden;}
.toast{position:fixed;top:calc(12px + var(--st));left:50%;transform:translateX(-50%);background:var(--gold);color:var(--bg);padding:10px 24px;border-radius:10px;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 8px 32px rgba(212,175,55,0.35);animation:fs .25s ease;pointer-events:none;}
@keyframes fs{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:calc(10px + var(--st)) 16px 10px;border-bottom:1px solid rgba(212,175,55,0.12);background:rgba(10,14,26,0.92);backdrop-filter:blur(16px);position:sticky;top:0;z-index:100;}
.hdr-l{display:flex;align-items:center;gap:10px;}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#aa8520);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 16px rgba(212,175,55,0.25);}
.logo-t{font-size:17px;font-weight:800;letter-spacing:1.5px;color:#fff;line-height:1.2;}
.logo-a{color:var(--gold);font-weight:400;}
.logo-sub{font-size:8px;color:var(--tx3);letter-spacing:2.5px;text-transform:uppercase;}
.nav{display:flex;gap:3px;}
.nb{padding:6px 11px;border-radius:7px;border:1px solid var(--bd);background:0;color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--fn);display:flex;align-items:center;gap:3px;}
.nb.a{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-b);}
.bdg{background:var(--gold);color:var(--bg);border-radius:7px;padding:1px 5px;font-size:9px;font-weight:800;margin-left:2px;}
/* Mobile nav */
.mn{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,26,0.95);backdrop-filter:blur(16px);border-top:1px solid rgba(212,175,55,0.1);padding:4px 0 calc(4px + var(--sb));z-index:100;}
.mn-i{display:flex;justify-content:space-around;}
.mn-b{display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 8px;border:0;background:0;color:var(--tx2);font-size:8px;font-weight:600;cursor:pointer;font-family:var(--fn);}
.mn-b.a{color:var(--gold);}
.mn-b .mi{font-size:18px;}
/* Layout */
.main{display:flex;min-height:calc(100dvh - 56px);}
.side{width:220px;padding:12px 10px;border-right:1px solid var(--bd);overflow-y:auto;max-height:calc(100dvh - 56px);flex-shrink:0;}
.cnt{flex:1;padding:14px;overflow-y:auto;max-height:calc(100dvh - 56px);}
/* Sidebar */
.nbtn{width:100%;padding:10px;border-radius:9px;border:1px dashed rgba(212,175,55,0.4);background:rgba(212,175,55,0.05);color:var(--gold);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--fn);margin-bottom:12px;}
.sl{font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--tx3);margin-bottom:4px;font-weight:700;}
.ss{margin-bottom:12px;}
/* Collapsible sidebar sections */
.ss-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:4px 0;}
.ss-toggle .sl{margin:0;}
.ss-arrow{font-size:10px;color:var(--tx3);transition:transform .2s;}
.ss-body{overflow:hidden;transition:max-height .3s ease;max-height:500px;}
.ss-body.collapsed{max-height:0;}
.cb{display:flex;align-items:center;gap:6px;width:100%;padding:5px 7px;border-radius:5px;border:0;background:0;color:var(--tx2);font-size:11px;cursor:pointer;text-align:left;font-family:var(--fn);}
.cb.a{background:var(--gold-dim);color:var(--gold);}
.cc{margin-left:auto;font-size:9px;color:var(--tx3);font-weight:600;}
.tc{display:flex;flex-wrap:wrap;gap:3px;}
.tp{padding:2px 8px;border-radius:8px;border:1px solid var(--bd);background:0;color:var(--tx3);font-size:9px;cursor:pointer;font-family:var(--fn);}
.tp.a{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-b);}
.stb{padding:10px;border-radius:9px;background:var(--card);border:1px solid var(--bd);}
.sr{display:flex;justify-content:space-between;padding:3px 0;}
.sr-l{font-size:10px;color:var(--tx3);}
.sr-v{font-size:11px;font-weight:700;color:var(--gold);}
/* Search */
.sbar{display:flex;gap:6px;margin-bottom:12px;}
.sin{flex:1;padding:9px 12px;border-radius:9px;border:1px solid var(--bd);background:rgba(255,255,255,0.04);color:var(--tx);font-size:13px;font-family:var(--fn);outline:0;}
.clr{padding:9px 12px;border-radius:9px;border:1px solid var(--bd);background:0;color:var(--tx2);font-size:11px;cursor:pointer;font-family:var(--fn);}
.io{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.iob{padding:5px 10px;border-radius:6px;border:1px solid var(--bd);background:0;color:var(--tx2);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--fn);}
/* Grid */
.grid{display:grid;grid-template-columns:1fr;gap:12px;}
/* Cards */
.cd{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:7px;}
.cd-h{display:flex;align-items:center;gap:6px;}
.cd-dot{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;}
.cd-cl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3);font-weight:700;}
.cd-act{margin-left:auto;display:flex;gap:2px;}
.ib{background:0;border:0;font-size:13px;cursor:pointer;opacity:.5;padding:3px;}
.cd-t{font-size:14px;font-weight:700;color:#fff;}
.cd-tags{display:flex;flex-wrap:wrap;gap:3px;}
.mt{padding:2px 6px;border-radius:4px;background:var(--gold-dim);color:var(--gold);font-size:8px;font-weight:600;letter-spacing:.3px;}
.cd-c{font-size:10px;line-height:1.6;color:var(--tx2);white-space:pre-wrap;word-break:break-word;margin:0;max-height:80px;overflow:hidden;font-family:var(--mo);transition:max-height .3s ease;position:relative;}
.cd-c.expanded{max-height:none;}
.cd-expand{font-size:10px;color:var(--gold);cursor:pointer;font-weight:600;border:0;background:0;padding:2px 0;font-family:var(--fn);}
.cd-f{display:flex;gap:5px;margin-top:auto;padding-top:6px;border-top:1px solid var(--bd);}
.ab{flex:1;padding:7px 8px;border-radius:7px;border:1px solid var(--bd);background:0;color:var(--tx2);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--fn);}
.ab.g{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-b);}
.ab.d{background:rgba(46,204,113,0.12);color:var(--green);border-color:rgba(46,204,113,0.25);}
.ab.dm{opacity:.45;pointer-events:none;}
/* Version badge */
.vb{font-size:8px;color:var(--tx3);padding:1px 5px;border-radius:4px;background:rgba(255,255,255,0.04);margin-left:auto;}
/* Score badge */
.scb{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;}
.scb.hi{background:rgba(46,204,113,0.1);color:var(--green);}
.scb.md{background:rgba(241,196,15,0.1);color:#f1c40f;}
.scb.lo{background:rgba(231,76,60,0.1);color:var(--red);}
/* Builder */
.bw{padding:16px;max-width:800px;margin:0 auto;}
.bt{font-size:20px;font-weight:800;color:#fff;margin-bottom:3px;}
.bsub{font-size:12px;color:var(--tx3);margin-bottom:16px;}
.bc{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:8px;}
.bc-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.bc-idx{width:22px;height:22px;border-radius:5px;background:var(--gold-dim);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;}
.bc-t{font-size:12px;font-weight:700;color:var(--tx);flex:1;}
.mbtn{width:26px;height:26px;border-radius:5px;border:1px solid var(--bd);background:0;color:var(--tx2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--fn);}
.mbtn.dg{color:var(--red);}
.bc-c{font-size:10px;line-height:1.6;color:var(--tx2);white-space:pre-wrap;margin:0;font-family:var(--mo);}
.cps{background:rgba(212,175,55,0.04);border:1px solid rgba(212,175,55,0.12);border-radius:12px;padding:16px;margin-top:16px;}
.cp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.cp-t{font-size:15px;font-weight:700;color:var(--gold);}
.cp-txt{font-size:10px;line-height:1.7;color:#c0ccdd;white-space:pre-wrap;word-break:break-word;margin:0;padding:12px;background:rgba(0,0,0,0.3);border-radius:8px;font-family:var(--mo);max-height:300px;overflow:auto;}
.cp-m{display:flex;justify-content:space-between;margin-top:8px;font-size:9px;color:var(--tx3);flex-wrap:wrap;gap:4px;}
/* Buttons */
.gb{padding:7px 14px;border-radius:7px;border:1px solid var(--gold-b);background:var(--gold-dim);color:var(--gold);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--fn);}
.ob{padding:7px 14px;border-radius:7px;border:1px solid var(--bd);background:0;color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--fn);}
/* Masters */
.mw{padding:16px;max-width:800px;margin:0 auto;}
.mc{background:var(--card);border:1px solid rgba(212,175,55,0.1);border-radius:12px;padding:16px;margin-bottom:12px;}
.mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;flex-wrap:wrap;gap:6px;}
.mc-t{font-size:14px;font-weight:700;color:#fff;}
.mc-m{font-size:10px;color:var(--tx3);margin-bottom:5px;}
.mc-sum{font-size:11px;color:var(--gold);cursor:pointer;font-weight:600;margin-top:8px;}
/* Form */
.fo{background:rgba(0,0,0,0.5);border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid rgba(212,175,55,0.12);}
.fo-t{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:12px;}
.fo-g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fg{margin-bottom:10px;}
.fl{display:block;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3);margin-bottom:4px;font-weight:700;}
.fi,.fsel{width:100%;padding:8px 10px;border-radius:7px;border:1px solid var(--bd);background:rgba(255,255,255,0.04);color:var(--tx);font-size:13px;font-family:var(--fn);outline:0;}
.fsel{background:rgba(10,14,26,0.9);}
.fta{width:100%;padding:10px;border-radius:7px;border:1px solid var(--bd);background:rgba(255,255,255,0.04);color:var(--tx);font-size:11px;font-family:var(--mo);line-height:1.6;outline:0;resize:vertical;}
.tir{display:flex;gap:5px;}
.atb{width:34px;border-radius:7px;border:1px solid var(--gold-b);background:var(--gold-dim);color:var(--gold);font-size:16px;cursor:pointer;}
.qt{padding:2px 6px;border-radius:4px;border:1px solid var(--bd);background:0;color:var(--tx3);font-size:8px;cursor:pointer;font-family:var(--fn);}
.fa{display:flex;justify-content:flex-end;gap:6px;margin-top:4px;}
/* Tag Palette in Form - organized by category */
.tp-section{margin-bottom:8px;}
.tp-label{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);font-weight:700;margin-bottom:3px;}
/* Song Timeline */
.tl-wrap{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:14px;}
.tl-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:8px;}
.tl-sub{font-size:10px;color:var(--tx3);margin-bottom:10px;}
.tl-track{display:flex;gap:4px;flex-wrap:wrap;min-height:40px;padding:8px;border-radius:8px;border:2px dashed rgba(255,255,255,0.08);background:rgba(0,0,0,0.15);margin-bottom:10px;}
.tl-block{padding:6px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none;}
.tl-block .tl-x{font-size:9px;opacity:.6;cursor:pointer;margin-left:4px;}
.tl-palette{display:flex;flex-wrap:wrap;gap:4px;}
.tl-add{padding:5px 10px;border-radius:6px;border:1px solid var(--bd);background:rgba(255,255,255,0.03);color:var(--tx2);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--fn);}
.tl-add:active{background:var(--gold-dim);color:var(--gold);}
.tl-output{font-size:10px;color:var(--tx2);font-family:var(--mo);margin-top:8px;padding:8px;background:rgba(0,0,0,0.2);border-radius:6px;}
.tl-copy{font-size:9px;color:var(--gold);cursor:pointer;font-weight:600;border:0;background:0;font-family:var(--fn);margin-top:4px;}
/* Scorecard */
.sc-wrap{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:14px;}
.sc-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:10px;}
.sc-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.sc-label{font-size:11px;color:var(--tx2);width:140px;flex-shrink:0;}
.sc-bar{flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden;position:relative;}
.sc-fill{height:100%;border-radius:4px;transition:width .3s ease;}
.sc-val{font-size:11px;font-weight:700;width:28px;text-align:right;}
.sc-total{display:flex;align-items:center;justify-content:space-between;padding-top:8px;border-top:1px solid var(--bd);margin-top:4px;}
.sc-total-label{font-size:12px;font-weight:700;color:#fff;}
.sc-total-val{font-size:18px;font-weight:800;}
/* Empty */
.emp{text-align:center;padding:50px 16px;grid-column:1/-1;}
.emp-i{font-size:44px;margin-bottom:10px;}
.emp-t{color:var(--tx2);font-size:14px;line-height:1.6;}
.emp-t strong{color:var(--gold);}
/* Version History */
.vh{margin-top:8px;font-size:9px;}
.vh summary{color:var(--gold);cursor:pointer;font-weight:600;font-size:10px;}
.vh-item{padding:6px 8px;border-left:2px solid var(--bd);margin:4px 0 4px 8px;color:var(--tx3);}
.vh-item .vh-date{font-weight:600;color:var(--tx2);margin-right:6px;}
/* Responsive */
@media(max-width:768px){.hdr .nav{display:none;}.mn{display:block;}.main{flex-direction:column;padding-bottom:65px;}.side{width:100%;max-height:none;border-right:0;border-bottom:1px solid var(--bd);padding:10px;}.cnt{max-height:none;padding:10px;}.fo-g2{grid-template-columns:1fr;}.bw,.mw{padding-bottom:calc(75px + var(--sb));}}
@media(min-width:769px){.grid{grid-template-columns:repeat(auto-fill,minmax(320px,1fr));}}
@media(min-width:1100px){.grid{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>
<div id="app"></div>
<nav class="mn" id="mobileNav">
<div class="mn-i">
<button class="mn-b a" onclick="switchView('library')" id="mn-library"><span class="mi">📚</span>Library</button>
<button class="mn-b" onclick="switchView('timeline')" id="mn-timeline"><span class="mi">🎼</span>Timeline</button>
<button class="mn-b" onclick="switchView('ai')" id="mn-ai"><span class="mi">🤖</span>AI</button>
<button class="mn-b" onclick="switchView('builder')" id="mn-builder"><span class="mi">🔧</span>Builder<span id="mn-badge" style="display:none" class="bdg">0</span></button>
<button class="mn-b" onclick="switchView('scorecard')" id="mn-scorecard"><span class="mi">📊</span>Score</button>
<button class="mn-b" onclick="switchView('saved')" id="mn-saved"><span class="mi">⚡</span>Masters</button>
</div>
</nav>
<script>
// ═══════ DATA ═══════
const CATEGORIES=[{id:"lyrics",label:"Lyrics",icon:"🎤",color:"#D4AF37"},{id:"style",label:"Style Tags",icon:"🎛️",color:"#C0392B"},{id:"production",label:"Production",icon:"🔊",color:"#2ECC71"},{id:"hook",label:"Hook/Concept",icon:"🪝",color:"#3498DB"},{id:"vocal",label:"Vocal Direction",icon:"🗣️",color:"#E67E22"},{id:"arrangement",label:"Arrangement",icon:"📐",color:"#9B59B6"},{id:"mix",label:"Mix Notes",icon:"🎚️",color:"#1ABC9C"},{id:"master",label:"Master Prompt",icon:"⚡",color:"#F1C40F"}];

// ═══════ 200+ TAG PALETTE ═══════
const TAG_PALETTE={
"Genre":["southern-soul","R&B","hip-hop","rap","pop","country","EDM","neo-soul","gospel","funk","boom-bap","trap","west-coast","east-coast","dirty-south","new-jack-swing","live-band","synth-funk","alt-R&B","soul","afrobeats","reggaeton","drill","lo-fi","jazz","blues","rock","indie","dancehall","house","techno","drum-and-bass","dubstep","ambient","classical","latin-pop","K-pop","Americana","outlaw-country","country-pop","G-funk","hyphy","crunk","bounce","phonk","cloud-rap","emo-rap","conscious-rap","gangsta-rap","melodic-rap"],
"Mood":["warm","aggressive","chill","celebratory","melancholy","hype","intimate","anthemic","nostalgic","triumphant","gritty","dreamy","euphoric","dark","uplifting","sensual","playful","intense","peaceful","rebellious","bittersweet","cinematic","raw","sophisticated","groovy","hypnotic","yearning","defiant","joyful","haunting"],
"Instruments":["Rhodes","Wurlitzer","piano","organ","synth-pad","synth-lead","analog-synth","Moog","808","TR-808","drum-machine","live-drums","congas","bongos","tambourine","handclaps","finger-snaps","shaker","hi-hats","crisp-snare","kick-drum","bass-guitar","upright-bass","electric-guitar","acoustic-guitar","rhythm-guitar","lead-guitar","wah-guitar","horns","trumpet","saxophone","trombone","flute","strings","violin","cello","harp","talkbox","vocoder","steel-guitar","banjo","fiddle","harmonica","turntables","scratches","sample-chops"],
"Vocals":["male-vocal","female-vocal","group-harmonies","choir","falsetto","baritone","tenor","alto","soprano","raspy","silky","nasal","talk-rap","talk-sing","croon","belting","whisper","ad-libs","call-and-response","gospel-runs","melisma","stacked-harmonies","vocal-chops","auto-tune","vocodex","spoken-word","preacher-style","conversational","animated-delivery","staccato-vocal"],
"Production":["vocal-forward","bass-heavy","lo-fi","hi-fi","warm-tape","analog-warm","digital-clean","vinyl-crackle","radio-ready","club-ready","headphone-mix","live-room","tight-mix","wide-stereo","mono-compatible","compressed","dynamic","saturated","crisp","muddy-free","sub-bass","mid-forward","bright","dark-mix","airy","dry-mix","wet-reverb","sidechain","chopped-samples","layered"],
"Era":["60s","70s","80s","90s","2000s","2010s","2020s","modern","vintage","retro","classic","timeless","future","throwback","golden-era","new-school","old-school"],
"Structure":["verse-chorus","AABA","through-composed","hook-first","drop-build","call-response","vamp-heavy","extended-outro","short-intro","long-intro","bridge-heavy","post-chorus","pre-chorus-lift","breakdown","buildup","fade-out"],
"BPM":["60-70 BPM","70-80 BPM","80-90 BPM","90-100 BPM","100-110 BPM","110-120 BPM","120-130 BPM","130-140 BPM","140-150 BPM","150+ BPM"]
};
const ALL_TAGS=Object.values(TAG_PALETTE).flat();
const GENRE_TAGS=TAG_PALETTE.Genre;
const MOOD_TAGS=TAG_PALETTE.Mood;

// ═══════ SONG TIMELINE SECTIONS ═══════
const SECTIONS=[
{id:"intro",label:"Intro",color:"#3498db",bracket:"[Intro]"},
{id:"verse",label:"Verse",color:"#2ecc71",bracket:"[Verse]"},
{id:"prechorus",label:"Pre-Chorus",color:"#e67e22",bracket:"[Pre-Chorus]"},
{id:"chorus",label:"Chorus",color:"#D4AF37",bracket:"[Chorus]"},
