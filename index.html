<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ONUS PromptLab">
<meta name="theme-color" content="#0a0e1a">
<title>ONUS PromptLab v2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#080b14;--bg2:#0d1220;--bg3:#131a2e;--gold:#D4AF37;--gold2:#f0d060;--gold-dim:rgba(212,175,55,0.1);--gold-b:rgba(212,175,55,0.2);--tx:#e8ecf2;--tx2:#8494a7;--tx3:#4a5568;--bd:rgba(255,255,255,0.06);--card:rgba(255,255,255,0.025);--fn:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--mo:'Courier New',Courier,monospace;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);--green:#34d399;--red:#f87171;--blue:#60a5fa;--r:12px;}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100dvh;overflow-x:hidden;}

/* Toast */
.toast{position:fixed;top:calc(16px + var(--st));left:50%;transform:translateX(-50%);background:linear-gradient(135deg,var(--gold),#c49b2a);color:#080b14;padding:12px 28px;border-radius:14px;font-weight:700;font-size:13px;z-index:9999;box-shadow:0 8px 32px rgba(212,175,55,0.4);animation:toastPop .35s cubic-bezier(.2,.8,.3,1.2);pointer-events:none;letter-spacing:0.3px;}
@keyframes toastPop{from{opacity:0;transform:translateX(-50%) translateY(-20px) scale(.85)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:calc(12px + var(--st)) 20px 12px;background:rgba(8,11,20,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(212,175,55,0.08);}
.hdr-l{display:flex;align-items:center;gap:12px;}
.logo{width:40px;height:40px;border-radius:12px;background:linear-gradient(145deg,var(--gold),#b8942a);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(212,175,55,0.3),inset 0 1px 0 rgba(255,255,255,0.25);}
.logo-t{font-size:19px;font-weight:800;letter-spacing:2px;color:#fff;line-height:1.1;}
.logo-a{color:var(--gold);font-weight:400;}
.logo-sub{font-size:7px;color:var(--tx3);letter-spacing:3px;text-transform:uppercase;margin-top:1px;}
.nav{display:flex;gap:4px;}
.nb{padding:7px 14px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--fn);display:flex;align-items:center;gap:4px;transition:all .2s ease;white-space:nowrap;}
.nb:active{transform:scale(.95);}
.nb.a{background:linear-gradient(135deg,rgba(212,175,55,0.15),rgba(212,175,55,0.08));color:var(--gold);border-color:var(--gold-b);box-shadow:0 2px 12px rgba(212,175,55,0.12);}
.bdg{background:var(--gold);color:var(--bg);border-radius:8px;padding:1px 6px;font-size:9px;font-weight:800;margin-left:3px;}

/* Mobile Nav */
.mn{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(8,11,20,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(212,175,55,0.08);padding:6px 0 calc(6px + var(--sb));z-index:100;}
.mn-i{display:flex;justify-content:space-around;max-width:400px;margin:0 auto;}
.mn-b{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;border:0;background:0;color:var(--tx3);font-size:9px;font-weight:600;cursor:pointer;font-family:var(--fn);transition:color .2s;position:relative;}
.mn-b.a{color:var(--gold);}
.mn-b.a::after{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--gold);border-radius:2px;}
.mn-b .mi{font-size:20px;}

/* Layout */
.main{display:flex;min-height:calc(100dvh - 60px);}
.side{width:220px;padding:12px 10px;border-right:1px solid var(--bd);overflow-y:auto;max-height:calc(100dvh - 60px);flex-shrink:0;}
.cnt{flex:1;padding:14px;overflow-y:auto;max-height:calc(100dvh - 60px);}

/* Sidebar */
.nbtn{width:100%;padding:12px;border-radius:var(--r);border:1px dashed rgba(212,175,55,0.3);background:rgba(212,175,55,0.04);color:var(--gold);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--fn);margin-bottom:12px;transition:all .2s;}.nbtn:active{transform:scale(.97);}
.sl{font-size:8px;text-transform:uppercase;letter-spacing:2.5px;color:var(--tx3);margin-bottom:4px;font-weight:700;}
.ss{margin-bottom:10px;}
.ss-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:6px 0;}
.ss-toggle .sl{margin:0;}
.ss-arrow{font-size:10px;color:var(--tx3);transition:transform .2s;}
.ss-body{overflow:hidden;transition:max-height .3s ease;max-height:500px;}
.ss-body.collapsed{max-height:0;}
.cb{display:flex;align-items:center;gap:6px;width:100%;padding:6px 8px;border-radius:8px;border:0;background:0;color:var(--tx2);font-size:11px;cursor:pointer;text-align:left;font-family:var(--fn);transition:all .15s;}
.cb.a{background:var(--gold-dim);color:var(--gold);}
.cc{margin-left:auto;font-size:9px;color:var(--tx3);font-weight:600;}
.tc{display:flex;flex-wrap:wrap;gap:4px;}
.tp{padding:3px 9px;border-radius:8px;border:1px solid var(--bd);background:0;color:var(--tx3);font-size:9px;cursor:pointer;font-family:var(--fn);transition:all .15s;}.tp:active{transform:scale(.93);}
.tp.a{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-b);}
.stb{padding:10px;border-radius:var(--r);background:var(--card);border:1px solid var(--bd);}
.sr{display:flex;justify-content:space-between;padding:3px 0;}
.sr-l{font-size:10px;color:var(--tx3);}
.sr-v{font-size:11px;font-weight:700;color:var(--gold);}

/* Search */
.sbar{display:flex;gap:6px;margin-bottom:12px;}
.sin{flex:1;padding:10px 14px;border-radius:var(--r);border:1px solid var(--bd);background:rgba(255,255,255,0.03);color:var(--tx);font-size:13px;font-family:var(--fn);outline:0;transition:border-color .2s;}.sin:focus{border-color:var(--gold-b);}
.clr{padding:10px 14px;border-radius:var(--r);border:1px solid var(--bd);background:0;color:var(--tx2);font-size:11px;cursor:pointer;font-family:var(--fn);}
.io{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.iob{padding:6px 10px;border-radius:8px;border:1px solid var(--bd);background:0;color:var(--tx2);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--fn);transition:all .15s;}.iob:active{transform:scale(.93);}

/* Grid */
.grid{display:grid;grid-template-columns:1fr;gap:12px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Cards — premium design */
.cd{background:linear-gradient(135deg,rgba(255,255,255,0.03),rgba(255,255,255,0.01));border:1px solid var(--bd);border-radius:14px;padding:16px 16px 12px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden;transition:transform .15s ease,box-shadow .2s ease;animation:cardSlide .3s ease both;}
.cd::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.cd:active{transform:scale(.98);}
@keyframes cardSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.cd-h{display:flex;align-items:center;gap:8px;}
.cd-dot{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.cd-cl{font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--tx3);font-weight:800;}
.cd-act{margin-left:auto;display:flex;gap:3px;}
.ib{background:0;border:0;font-size:14px;cursor:pointer;opacity:.35;padding:4px;transition:opacity .2s;}.ib:active{opacity:1;transform:scale(1.1);}
.cd-t{font-size:16px;font-weight:800;color:#fff;letter-spacing:0.2px;line-height:1.3;}
.cd-tags{display:flex;flex-wrap:wrap;gap:3px;}
.mt{padding:2px 8px;border-radius:6px;background:var(--gold-dim);color:var(--gold);font-size:8px;font-weight:700;letter-spacing:.5px;}
.cd-c{font-size:10px;line-height:1.7;color:var(--tx2);white-space:pre-wrap;word-break:break-word;margin:0;max-height:60px;overflow:hidden;font-family:var(--mo);transition:max-height .3s ease;}
.cd-c.expanded{max-height:none;}
.cd-expand{font-size:10px;color:var(--gold);cursor:pointer;font-weight:700;border:0;background:0;padding:2px 0;font-family:var(--fn);}
.cd-f{display:flex;gap:5px;margin-top:auto;padding-top:8px;border-top:1px solid var(--bd);}
.ab{flex:1;padding:8px;border-radius:9px;border:1px solid var(--bd);background:0;color:var(--tx2);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--fn);transition:all .15s;text-align:center;}.ab:active{transform:scale(.95);}
.ab.g{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-b);}
.ab.d{background:rgba(52,211,153,0.08);color:var(--green);border-color:rgba(52,211,153,0.2);}
.ab.dm{opacity:.35;pointer-events:none;}

/* Version + Score badges */
.vb{font-size:8px;color:var(--tx3);padding:1px 5px;border-radius:5px;background:rgba(255,255,255,0.04);margin-left:auto;}
.scb{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;font-size:9px;font-weight:800;}
.scb.hi{background:rgba(52,211,153,0.1);color:var(--green);}
.scb.md{background:rgba(250,204,21,0.1);color:#facc15;}
.scb.lo{background:rgba(248,113,113,0.1);color:var(--red);}

/* Builder area */
.bw{padding:16px;max-width:820px;margin:0 auto;animation:fadeUp .3s ease;}
.bt{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:0.3px;}
.bsub{font-size:12px;color:var(--tx3);margin-bottom:16px;line-height:1.5;}
.bc{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:12px;margin-bottom:8px;transition:all .15s;animation:cardSlide .25s ease both;}
.bc:active{transform:scale(.985);}
.bc-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.bc-idx{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,var(--gold-dim),rgba(212,175,55,0.05));color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;}
.bc-t{font-size:12px;font-weight:700;color:var(--tx);flex:1;}
.mbtn{width:28px;height:28px;border-radius:7px;border:1px solid var(--bd);background:0;color:var(--tx2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--fn);transition:all .15s;}.mbtn:active{transform:scale(.9);background:var(--gold-dim);}
.mbtn.dg{color:var(--red);}
.bc-c{font-size:10px;line-height:1.7;color:var(--tx2);white-space:pre-wrap;margin:0;font-family:var(--mo);}
.cps{background:rgba(212,175,55,0.03);border:1px solid rgba(212,175,55,0.1);border-radius:14px;padding:16px;margin-top:16px;}
.cp-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.cp-t{font-size:16px;font-weight:800;color:var(--gold);}
.cp-txt{font-size:10px;line-height:1.7;color:#b0bccc;white-space:pre-wrap;word-break:break-word;margin:0;padding:12px;background:rgba(0,0,0,0.3);border-radius:10px;font-family:var(--mo);max-height:300px;overflow:auto;}
.cp-m{display:flex;justify-content:space-between;margin-top:8px;font-size:9px;color:var(--tx3);flex-wrap:wrap;gap:4px;}

/* Buttons */
.gb{padding:9px 16px;border-radius:10px;border:1px solid var(--gold-b);background:linear-gradient(135deg,rgba(212,175,55,0.12),rgba(212,175,55,0.06));color:var(--gold);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--fn);transition:all .2s ease;letter-spacing:0.2px;}.gb:active{transform:scale(.95);box-shadow:0 2px 12px rgba(212,175,55,0.2);}
.ob{padding:9px 16px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--tx2);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--fn);transition:all .2s ease;}.ob:active{transform:scale(.95);background:rgba(255,255,255,0.03);}

/* Masters */
.mw{padding:16px;max-width:820px;margin:0 auto;animation:fadeUp .3s ease;}
.mc{background:linear-gradient(135deg,rgba(212,175,55,0.03),var(--card));border:1px solid rgba(212,175,55,0.08);border-radius:14px;padding:16px;margin-bottom:12px;transition:transform .15s;}.mc:active{transform:scale(.985);}
.mc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:6px;}
.mc-t{font-size:15px;font-weight:800;color:#fff;}
.mc-m{font-size:10px;color:var(--tx3);margin-bottom:6px;}
.mc-sum{font-size:11px;color:var(--gold);cursor:pointer;font-weight:700;margin-top:8px;}

/* Form */
.fo{background:rgba(0,0,0,0.4);border-radius:14px;padding:18px;margin-bottom:14px;border:1px solid rgba(212,175,55,0.1);animation:fadeUp .25s ease;}
.fo-t{font-size:17px;font-weight:800;color:var(--gold);margin-bottom:14px;}
.fo-g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fg{margin-bottom:10px;}
.fl{display:block;font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--tx3);margin-bottom:5px;font-weight:700;}
.fi,.fsel{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--bd);background:rgba(255,255,255,0.03);color:var(--tx);font-size:13px;font-family:var(--fn);outline:0;transition:border-color .2s;}.fi:focus,.fsel:focus{border-color:var(--gold-b);}
.fsel{background:rgba(8,11,20,0.9);}
.fta{width:100%;padding:12px;border-radius:10px;border:1px solid var(--bd);background:rgba(255,255,255,0.03);color:var(--tx);font-size:12px;font-family:var(--mo);line-height:1.7;outline:0;resize:vertical;transition:border-color .2s;}.fta:focus{border-color:var(--gold-b);}
.fta::placeholder{color:rgba(212,175,55,0.3);font-style:italic;font-family:var(--fn);}
.tir{display:flex;gap:5px;}
.atb{width:36px;border-radius:10px;border:1px solid var(--gold-b);background:var(--gold-dim);color:var(--gold);font-size:16px;cursor:pointer;}
.qt{padding:3px 7px;border-radius:6px;border:1px solid var(--bd);background:0;color:var(--tx3);font-size:8px;cursor:pointer;font-family:var(--fn);transition:all .15s;}.qt:active{transform:scale(.9);}
.qt.a{background:var(--gold-dim);color:var(--gold);border-color:var(--gold-b);}
.tp-section{margin-top:6px;}
.tp-label{font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3);margin-bottom:3px;font-weight:600;}
.fa{display:flex;gap:6px;margin-top:8px;}

/* Timeline */
.tl-wrap{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:14px;}
.tl-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:8px;}
.tl-sub{font-size:11px;color:var(--tx3);margin-bottom:8px;}
.tl-track{display:flex;gap:4px;flex-wrap:wrap;min-height:44px;padding:10px;border-radius:10px;border:2px dashed rgba(255,255,255,0.06);background:rgba(0,0,0,0.15);margin-bottom:10px;}
.tl-block{padding:7px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;user-select:none;transition:transform .1s;}.tl-block:active{transform:scale(.92);}
.tl-block .tl-x{font-size:9px;opacity:.6;cursor:pointer;margin-left:4px;}
.tl-palette{display:flex;flex-wrap:wrap;gap:4px;}
.tl-add{padding:6px 12px;border-radius:8px;border:1px solid var(--bd);background:rgba(255,255,255,0.02);color:var(--tx2);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--fn);transition:all .15s;}
.tl-add:active{background:var(--gold-dim);color:var(--gold);transform:scale(.93);}
.tl-output{font-size:10px;color:var(--tx2);font-family:var(--mo);margin-top:8px;padding:10px;background:rgba(0,0,0,0.2);border-radius:8px;}
.tl-copy{font-size:9px;color:var(--gold);cursor:pointer;font-weight:600;border:0;background:0;font-family:var(--fn);margin-top:4px;}

/* Scorecard */
.sc-wrap{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:14px;}
.sc-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:10px;}
.sc-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.sc-label{font-size:11px;color:var(--tx2);width:140px;flex-shrink:0;font-weight:500;}
.sc-bar{flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden;position:relative;}
.sc-fill{height:100%;border-radius:4px;transition:width .3s ease;}
.sc-val{font-size:12px;font-weight:800;width:28px;text-align:right;}
.sc-total{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--bd);margin-top:6px;}
.sc-total-label{font-size:13px;font-weight:800;color:#fff;}
.sc-total-val{font-size:20px;font-weight:800;}

/* Empty */
.emp{text-align:center;padding:60px 20px;grid-column:1/-1;animation:fadeUp .3s ease;}
.emp-i{font-size:48px;margin-bottom:12px;}
.emp-t{color:var(--tx2);font-size:14px;line-height:1.7;}
.emp-t strong{color:var(--gold);}

/* Version History */
.vh{margin-top:8px;font-size:9px;}
.vh summary{color:var(--gold);cursor:pointer;font-weight:700;font-size:10px;}
.vh-item{padding:6px 8px;border-left:2px solid var(--bd);margin:4px 0 4px 8px;color:var(--tx3);}
.vh-item .vh-date{font-weight:700;color:var(--tx2);margin-right:6px;}

/* Responsive */
@media(max-width:768px){.hdr .nav{display:none;}.mn{display:block;}.main{flex-direction:column;padding-bottom:70px;}.side{width:100%;max-height:none;border-right:0;border-bottom:1px solid var(--bd);padding:10px;}.cnt{max-height:none;padding:10px;}.fo-g2{grid-template-columns:1fr;}.bw,.mw{padding-bottom:calc(80px + var(--sb));}}
@media(min-width:769px){.grid{grid-template-columns:repeat(auto-fill,minmax(340px,1fr));}}
@media(min-width:1100px){.grid{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>
<div id="app"></div>
<nav class="mn" id="mobileNav">
<div class="mn-i">
<button class="mn-b a" onclick="switchView('create')" id="mn-create"><span class="mi">🤖</span>Create</button>
<button class="mn-b" onclick="switchView('library')" id="mn-library"><span class="mi">📚</span>Library<span id="mn-badge" style="display:none" class="bdg">0</span></button>
<button class="mn-b" onclick="switchView('saved')" id="mn-saved"><span class="mi">⚡</span>Masters</button>
</div>
</nav>
<script>
// ═══════ DATA ═══════
const CATEGORIES=[
{id:"lyrics",label:"Lyrics",icon:"🎤",color:"#D4AF37"},
{id:"style",label:"Style Tags",icon:"🎛️",color:"#C0392B"},
{id:"production",label:"Production",icon:"🔊",color:"#2ECC71"},
{id:"hook",label:"Hook/Concept",icon:"🪝",color:"#3498DB"},
{id:"vocal",label:"Vocal Direction",icon:"🗣️",color:"#E67E22"},
{id:"arrangement",label:"Arrangement",icon:"📐",color:"#9B59B6"},
{id:"mix",label:"Mix Notes",icon:"🎚️",color:"#1ABC9C"},
{id:"beats",label:"Beats/Drums",icon:"🥁",color:"#e74c3c"},
{id:"samples",label:"Samples/Loops",icon:"🔁",color:"#f39c12"},
{id:"sounddesign",label:"Sound Design",icon:"🎹",color:"#2980b9"},
{id:"system",label:"System Prompt",icon:"🧠",color:"#8e44ad"},
{id:"framework",label:"Creative Framework",icon:"💡",color:"#e056a0"},
{id:"master",label:"Master Prompt",icon:"⚡",color:"#F1C40F"},
];

{id:"p5",title:"Anti-Sing Rap Lock",category:"vocal",tags:["rap","hip-hop","west-coast","gritty"],content:"[Vocal: RAP ONLY] — staccato talk-rap, no melody drift, no singing. Hard consonant emphasis, syllable clustering, controlled syncopation. Push-pull pocket, conversational timing. Ad-libs in gaps only.",rating:5,created:Date.now()-432000000,versions:[]},
{id:"p6",title:"Bay Area Staccato Talk-Rap — Full Vocal DNA",category:"vocal",tags:["rap","west-coast","hip-hop","gritty","hype"],content:"[Vocal: RAP ONLY — NO SINGING, NO MELODY, NO HUMMING]\n\nVoice character: nasal, sharp, animated — like a voice actor doing stand-up inside a rap verse. Tone is bright and forward, cuts through without screaming. Cartoon uncle energy — playful menace, not monotone tough guy. Voice warps mid-word: stretching vowels for comedic timing, snapping consonants like percussion hits, pinching nose on punchlines.\n\nCadence: staccato-first — short choppy bursts of 3-5 syllables then hard pause. Rubber-ball bounce: accelerate mid-line then brake suddenly. Push-pull timing: some phrases AHEAD of beat, some BEHIND — never locked on grid. Syllable stacking: cram 8 where 4 go, leave whole beat empty. Stop-start restart: cut out mid-bar, re-enter on unexpected syllable.\n\nAd-libs: sit IN gaps between clusters. Types: \"uhh!\", \"yup!\", \"aye!\", tongue clicks, \"brrt\", \"sheesh\". One ad-lib every 4-6 bars. Double-track on punchline word only.\n\nRhyme: internal over end rhyme. 3-4 syllable chains. Slant/near-rhymes preferred. Punchlines land on LAST word before pause. Shift pattern every 4 bars.\n\nPersona: hustler-philosopher. Comedic hyper-specific similes. Uncle-who-gives-game. Regional slang as rhythm tools. Rapid-fire noun lists stopped cold.\n\nMix: vocal forward and dry, close-mic, nasal EQ bump 1-2kHz.\n\nAnti-drift: if vocal melodizes pull back to hard talk-rap immediately.",rating:5,created:Date.now()-518400000,versions:[]},

{id:"pl1",title:"We Still Standin' — Southern Soul (Full Lyrics)",category:"lyrics",tags:["southern-soul","celebratory","anthemic","warm","cookout"],content:"[Intro — Rhodes + congas, crowd warmth]\n*Vinyl crackle fades in*\n\n[Verse 1 — warm croon, behind the beat]\nKitchen table still got the scratches from when we were small\nMama humming something holy while the cornbread rose tall\nFront porch sagging but we never let it fall\nEvery Sunday, same faces, same grace, same call\nLost a few along the way — set a chair for them too\nPour a little something extra, that's what family gon' do\n\n[Pre-Chorus — build, handclaps enter]\nWe been through the fire, been through the flood\nBeen through the kind of storms that test your blood\n(Test your blood)\n\n[Chorus — full band, crowd singalong]\nWe still standin' (We still standin')\nAfter everything, we still here\nWe still standin' (We still standin')\nPour it up and hold your people near\nWe still standin'\n\n[Verse 2 — deeper, more personal]\nGot your voicemail saved, I play it when the house gets quiet\nYour laugh still fills the room even though you ain't inside it\nGrandkids wearing your face, running through the yard\nCarrying everything you gave us — love the strongest card\n\n[Bridge — drop to handclaps + congas only, preacher-style]\n(Clap it up, clap it up)\nI said if you got somebody worth keeping — hold 'em\nIf you got a table worth sitting at — show up\nIf you survived what tried to break you — stand up\n(We still standin'!)\n\n[Chorus — full band explosion]\nWe still standin' (We still standin')\nAfter everything, we still here\n\n[Outro/Vamp — extended, ad-libs, band callouts]\nStill standin'... still standin'...\n(Talk to me, Rhodes)\n(Let that bass walk)\nWe still here, baby\nAin't going nowhere\n*Fade out*",rating:5,created:Date.now()-700000000,versions:[]},

{id:"pl2",title:"Trap Soul — Burning Bridges (Full Lyrics)",category:"lyrics",tags:["trap","soul","dark","intimate","R&B"],content:"[Intro — ambient pad, distant 808]\n\n[Verse 1 — soft, close mic, half-whisper]\nSmoke still hanging where the conversation died\nI could've stayed but something in me chose the other side\nYour coffee cup still sitting where you left it by the bed\nI wash everything except that — don't ask me why I said\nThe lock clicks different now without your key beside mine\nFour walls and a ceiling but it doesn't feel like mine\n\n[Pre-Chorus — 808 enters, building]\nI didn't want the quiet\nI wanted you to fight for it\n\n[Chorus — open, emotional, vocal forward]\nBurning bridges just to stay warm\nWatching everything we built turn to ash\nBurning bridges just to stay warm\nWondering if the smoke ever clears — do you come back?\n\n[Verse 2 — more intense, drums fully in]\nDrove past your mama's house, the porch light still on\nAlmost pulled in, almost called, almost wrote this song\nDifferent — but here we are, me talking to the dark\nYour sweater in my closet still carries your spark\nThey say time heals everything but nobody says how long\nNobody says the healing sounds exactly like this song\n\n[Bridge — stripped, piano only]\nI'm not asking you to save me\nI'm just asking you to stay\nNot forever, just tonight\nJust long enough to say\n\n[Chorus — full, ad-libs]\nBurning bridges just to stay warm\n(Stay warm)\nWatching everything we built\n(Everything)\nBurning bridges just to stay warm\nWondering if you come back...\n\n[Outro — fade, distant vocal]\nCome back... come back...",rating:5,created:Date.now()-700100000,versions:[]},

{id:"pl3",title:"Bay Area Rap — Game Talk (Full Lyrics)",category:"lyrics",tags:["rap","west-coast","bay-area","hip-hop","gritty"],content:"[Intro — 808 rumble, snap]\n[Vocal: RAP ONLY]\n\n[Verse 1 — staccato, nasal, animated]\nSee the problem with you cats — (uhh!) — is you talk about the pot\nBut you never stirred the spoon, never turned the flame up hot\nI been seasoning this game — since the stove was second-hand\nNow the kitchen smell like victory — you wouldn't understand\n(Nah!)\nFour-five fools at the table — only two of 'em eat\nRest of 'em taking pictures of a plate that ain't theirs\n(Sheesh)\nI read the room before I read the menu — that's instinct\nYou read the comments — that's the difference, let it sink\n\n[Chorus — hard, crowd chant energy]\nGame is game — can't teach it from a book\n(Game is game!)\nEither you read the room or you get took\nGame is game — I learned it from the block\n(From the block!)\nNot the internet — the school of hard knocks\n\n[Verse 2 — faster bursts, comedic]\nDude said he a chef — (brrt!) — but he using Uber Eats\nSaid he run the city — can't even run a meet\nI seen more cap than a fitted rack at Lids\nMore fraud than a email asking me to click a link\n(Yup!)\nMy uncle told me — look at what they DO not what they POST\nA closed mouth don't get fed but a loud one don't get close\nI keep my circle tighter than a jar you can't twist\nIf you wasn't there when it was empty — you don't eat when it's lit\n\n[Bridge — drop to snaps + bass only]\nListen — (listen) — the game don't owe you nothing\nBut it'll teach you everything — if you pay attention\n\n[Chorus]\nGame is game — can't teach it from a book\n\n[Outro — fade, ad-libs]\n(Aye... game is game... uhh!)\n*Bass fades*",rating:5,created:Date.now()-700200000,versions:[]},

{id:"pl4",title:"Neo-Soul Healing — Golden Hour (Full Lyrics)",category:"lyrics",tags:["neo-soul","warm","intimate","healing","jazz"],content:"[Intro — Rhodes, soft breath]\n\n[Verse 1 — warm, conversational, gentle]\nMorning light through the curtain, painting gold on the floor\nI been chasing something heavy — today I'm chasing it no more\nFilled the tub, lit the candle, let the water take the weight\nSometimes healing looks like nothing — just being still and feeling safe\nMama called to say she's proud, didn't need a reason why\nThat's the kind of love that holds you up without asking you to fly\n\n[Chorus — open, singable, group harmonies enter]\nThis is my golden hour\nNot rushing, not running, just here\nThis is my golden hour\nEverything I need is near\n\n[Verse 2 — deeper, more reflective]\nUsed to measure every day by what I didn't get done\nNow I measure by the moments — and today I found one\nBarefoot in the kitchen, humming something mama sang\nThe melody ain't perfect but the feeling — that's the thing\nBreathing in, breathing out, letting yesterday be gone\nThe cracks let the light in — isn't that where grace comes from?\n\n[Bridge — stripped to voice + Rhodes]\nI don't need to be fixed\nI just need to be found\nNot by someone else — by me\nStanding on solid ground\n\n[Chorus — full band, celebration energy]\nThis is my golden hour\n(Golden hour)\nNot rushing, not running\n(Just here)\nThis is my golden hour\nEverything I need is near\n\n[Outro — vamp, ad-libs]\nGolden... golden...\n(Take your time, baby)\n(You're right where you need to be)\n*Gentle fade*",rating:5,created:Date.now()-700300000,versions:[]},

{id:"pl5",title:"Country-Soul — Gravel Road (Full Lyrics)",category:"lyrics",tags:["country","soul","nostalgic","warm","acoustic-guitar"],content:"[Intro — acoustic guitar fingerpick, crickets]\n\n[Verse 1 — storytelling, steady, clear diction]\nGravel road don't go nowhere fancy — just back to where I'm from\nPast the church with the crooked steeple and the bell that still gets rung\nDaddy's truck still parked like he's coming home for lunch\nMama keeps the engine running — she says it helps a bunch\nSmall town got smaller since the factory shut its doors\nBut the people got bigger — that's what porches are for\n\n[Chorus — warm, singable, pedal steel enters]\nTake me down that gravel road\nWhere the weight comes off and the evening's slow\nWhere you know every name and they know every scar\nTake me down that gravel road — it ain't far\n\n[Verse 2 — personal, deeper]\nFriday nights we'd pile in, windows down past the fields\nSinging wrong words to right songs — that's the only prayer that's real\nI been gone long enough to miss the things I used to hate\nThe quiet, the knowing, the everyone-at-the-gate\nCity gave me everything except a reason to stay\nHome gave me nothing except a reason to come back someday\n\n[Bridge — a cappella moment, then band swells]\nI don't need the skyline\nI don't need the speed\nI just need the porch light on\nAnd someone saving a seat\n\n[Chorus — full, crowd singalong]\nTake me down that gravel road\nWhere the weight comes off and the evening's slow\n\n[Outro — guitar solo, fade]\n*Gravel crunching underfoot*",rating:5,created:Date.now()-700400000,versions:[]},

const existIds=new Set(S.prompts.map(x=>x.id));
const existTitles=new Set(S.prompts.map(x=>x.title?.toLowerCase()));
INITIAL_PROMPTS.forEach(ip=>{if(!existIds.has(ip.id)&&!existTitles.has(ip.title?.toLowerCase())){S.prompts.push({...ip});}});

try{const ai=localStorage.getItem("onus3-ai");if(ai)S.aiResult=JSON.parse(ai);}catch(e){}
try{const aid=localStorage.getItem("onus3-aid");if(aid)S.aiDesc=aid;}catch(e){}

function exportAll(){const d={prompts:S.prompts,builder:S.builder,masters:S.masters,timeline:S.timeline,scores:S.scores,exported:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`onus-v2-backup-${Date.now()}.json`;a.click();URL.revokeObjectURL(u);toast("Exported all data");}
function triggerImport(){const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.prompts){const ids=new Set(S.prompts.map(x=>x.id));S.prompts=[...d.prompts.filter(x=>!ids.has(x.id)),...S.prompts];}if(d.masters){const ids=new Set(S.masters.map(x=>x.id));S.masters=[...d.masters.filter(x=>!ids.has(x.id)),...S.masters];}save();render();toast(`Imported successfully`);}catch(err){toast("Import failed");}};r.readAsText(f);};i.click();}

function tlAdd(secId){const sec=SECTIONS.find(x=>x.id===secId);if(!sec)return;S.timeline.push({id:uid(),secId:sec.id,notes:"",tags:[]});save();render();}
function tlRm(id){S.timeline=S.timeline.filter(x=>x.id!==id);save();render();}
function tlSetNotes(id,val){const t=S.timeline.find(x=>x.id===id);if(t)t.notes=val;save();}
function tlAddTag(id,tag){const t=S.timeline.find(x=>x.id===id);if(t&&!t.tags.includes(tag)){t.tags.push(tag);save();render();}}
function tlRmTag(id,tag){const t=S.timeline.find(x=>x.id===id);if(t){t.tags=t.tags.filter(x=>x!==tag);save();render();}}
function tlOutput(){return S.timeline.map(t=>{const s=SECTIONS.find(x=>x.id===t.secId);if(!s)return"";let out=s.bracket;const extras=[];if(t.tags&&t.tags.length>0)extras.push(t.tags.join(", "));if(t.notes)extras.push(t.notes);if(extras.length>0)out=s.bracket.slice(0,-1)+" — "+extras.join("; ")+"]";return out;}).join("\n");}

// Refresh single section function
async function refreshSection(sectionKey,sectionLabel){
if(!API_KEY){toast("Need API key");return;}
const keepParts=Object.entries(S.aiResult).filter(([k,v])=>k!==sectionKey&&typeof v==="string"&&v.length>10).map(([k,v])=>k+": "+v.slice(0,100)).join("\n");
const refreshPrompt="I already have a generated song. I want to KEEP everything else but get a NEW "+sectionLabel+". Here is the context of the existing song:\n"+keepParts+"\n\nGenerate ONLY a new "+sectionLabel+". Return JSON with just the key '"+sectionKey+"' and the new content. Return ONLY valid JSON, no markdown.";
toast("Refreshing "+sectionLabel+"...");
try{
const sysPrompt=S.promptVersion==="v3"?GENIUS_SYSTEM:S.promptVersion==="v2"?FLOSS_SYSTEM:ONUS_SYSTEM;
const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:24000,temperature:1,thinking:{type:"enabled",budget_tokens:16000},system:sysPrompt,messages:[{role:"user",content:refreshPrompt}]})});
if(!res.ok){toast("Refresh failed");return;}
const data=await res.json();
const text=data.content.filter(c=>c.type==="text").map(c=>c.text||"").join("");
const clean=text.replace(/```json|```/g,"").trim();
const parsed=JSON.parse(clean);
// Save old version before replacing
const oldVal=S.aiResult[sectionKey];
if(oldVal){S.prompts.unshift({id:uid(),title:"[Old "+sectionLabel+"] "+(r.title||""),category:sectionKey==="lyrics_prompt"?"lyrics":sectionKey.includes("style")?"style":sectionKey.includes("vocal")?"vocal":"arrangement",tags:r.tags||[],content:oldVal,rating:3,created:Date.now(),versions:[]});}
// Update just this section
if(parsed[sectionKey])S.aiResult[sectionKey]=parsed[sectionKey];
else{const firstVal=Object.values(parsed)[0];if(typeof firstVal==="string")S.aiResult[sectionKey]=firstVal;}
try{localStorage.setItem("onus3-ai",JSON.stringify(S.aiResult))}catch(ex){}
save();render();toast("New "+sectionLabel+"! Old one saved to Library.");
}catch(e){toast("Refresh error: "+e.message);}}

if(S.builder.length===0){w.append(h("div",{className:"emp",style:{padding:"40px 16px"}},[h("div",{className:"emp-i"},"🔧"),h("div",{className:"emp-t"},["Empty. Add from ",h("strong",{},"Library")," sidebar or use ",h("strong",{},"AI Generate")])]));}
else{
S.builder.forEach((b,i)=>{const cat=CATEGORIES.find(c=>c.id===b.category);
const editArea=h("textarea",{className:"fta",rows:"3",style:{fontSize:"10px",marginTop:"4px"}},b.content);
editArea.addEventListener("input",e=>editBldContent(b.builderId,e.target.value));
w.append(h("div",{className:"bc"},[
h("div",{className:"bc-top"},[
h("span",{className:"bc-idx"},String(i+1)),
h("span",{className:"cd-dot",style:{backgroundColor:cat?.color||"#888",marginRight:"4px"}},cat?.icon||""),
h("span",{className:"bc-t"},b.title),
h("div",{style:{marginLeft:"auto",display:"flex",gap:"3px"}},[
h("button",{className:"gb",style:{fontSize:"9px",padding:"3px 8px"},onClick:()=>cp(b.content,"bld-"+b.builderId)},S.copied===("bld-"+b.builderId)?"✓":"📋"),
h("button",{className:"mbtn",onClick:()=>mvBld(i,-1)},"▲"),
h("button",{className:"mbtn",onClick:()=>mvBld(i,1)},"▼"),
h("button",{className:"mbtn dg",onClick:()=>rmBld(b.builderId)},"✕"),
])]),
editArea,
]));});
w.append(h("div",{style:{display:"flex",gap:"6px",marginTop:"12px"}},[
h("button",{className:"gb",style:{flex:1,padding:"12px",fontWeight:"800"},onClick:builderToMaster},"⚡ Finalize as Master"),
h("button",{className:"gb",style:{flex:1,padding:"12px"},onClick:()=>cp(compile(),"master")},S.copied==="master"?"✓ Copied":"📋 Copy All"),
h("button",{className:"ob",style:{padding:"12px"},onClick:()=>switchView("library")},"+ Add More"),
]));
}}

// ═── SCORECARD SUB-TAB ──═
if(subView==="scorecard"){
w.append(h("div",{style:{fontSize:"12px",fontWeight:"700",color:"#fff",marginBottom:"8px"}},"📊 Score a Prompt"));
w.append(h("div",{style:{fontSize:"10px",color:"var(--tx2)",marginBottom:"12px",lineHeight:"1.6"}},"Select a prompt to score it on 8 hit criteria. Scores save with the prompt permanently. Use scores to find your best work and identify what needs improvement."));
// Prompt selector dropdown
const scorablePrompts=S.prompts.filter(p=>p.category==="master"||p.category==="lyrics"||p.category==="style");
const selPrompt=h("select",{className:"fsel",style:{marginBottom:"12px",fontSize:"12px"},onChange:e=>{S.scoringPromptId=e.target.value;render();}});
selPrompt.append(h("option",{value:""},"— Select a prompt to score —"));
scorablePrompts.forEach(p=>{const o=h("option",{value:p.id},(p.scores?"✅ ":"")+(p.title||"Untitled").slice(0,50));if(S.scoringPromptId===p.id)o.selected=true;selPrompt.append(o);});
w.append(selPrompt);
// If a prompt is selected, show scoring sliders
const sp=S.prompts.find(p=>p.id===S.scoringPromptId);
if(sp){
const pScores=sp.scores||{hook:5,section:5,groove:5,emotion:5,lyrics:5,spectral:5,translation:5,novelty:5};
w.append(h("div",{style:{padding:"10px",borderRadius:"8px",background:"var(--card)",border:"1px solid var(--bd)",marginBottom:"10px"}},[
h("div",{style:{fontSize:"11px",fontWeight:"700",color:"var(--gold)",marginBottom:"6px"}},"Scoring: "+sp.title),
h("pre",{style:{fontSize:"9px",color:"var(--tx3)",maxHeight:"60px",overflow:"hidden",margin:"0 0 8px 0",fontFamily:"var(--mo)"}},sp.content.slice(0,200)+"..."),
]));
SCORE_CRITERIA.forEach(cr=>{const val=pScores[cr.id]||5;
const sl=h("input",{type:"range",min:"0",max:"10",value:String(val),style:{flex:"1",accentColor:"var(--gold)"}});
sl.addEventListener("input",e=>{
if(!sp.scores)sp.scores={};
sp.scores[cr.id]=parseInt(e.target.value);
save();render();});
w.append(h("div",{className:"sc-row"},[h("div",{className:"sc-label"},cr.label),sl,h("div",{className:"sc-val",style:{color:scoreColor(val)}},String(val))]));});
const vals=Object.values(pScores);
const tot=Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10);
w.append(h("div",{className:"sc-total"},[h("div",{className:"sc-total-label"},"Hit Score"),h("div",{className:"sc-total-val",style:{color:tot>=85?"var(--green)":tot>=60?"#f1c40f":"var(--red)"}},tot+"/100")]));
if(tot<85)w.append(h("div",{style:{marginTop:"8px",padding:"10px",borderRadius:"8px",background:"rgba(231,76,60,0.08)",fontSize:"11px",color:"var(--tx2)"}},[h("strong",{style:{color:"var(--red)"}},"Improve: "),Object.entries(pScores).filter(([k,v])=>v<7).map(([k])=>SCORE_CRITERIA.find(c=>c.id===k)?.label).filter(Boolean).join(", ")||"All 7+, refine further"]));
}
// Show top scored prompts
const scoredPrompts=S.prompts.filter(p=>p.scores).map(p=>{const vals=Object.values(p.scores);return{...p,totalScore:Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)};}).sort((a,b)=>b.totalScore-a.totalScore);
if(scoredPrompts.length>0){
w.append(h("div",{style:{marginTop:"16px",fontSize:"12px",fontWeight:"700",color:"#fff",marginBottom:"8px"}},"🏆 Top Scored Prompts"));
scoredPrompts.slice(0,10).forEach((p,i)=>{
const cat=CATEGORIES.find(c=>c.id===p.category);
w.append(h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"6px 8px",borderRadius:"6px",background:i<3?"rgba(212,175,55,0.06)":"transparent",marginBottom:"4px"}},[
h("span",{style:{fontSize:"12px",fontWeight:"800",color:i===0?"var(--gold)":i<3?"#f1c40f":"var(--tx3)",width:"24px"}},String(i+1)),
h("span",{style:{fontSize:"12px"}},cat?.icon||""),
h("span",{style:{fontSize:"11px",color:"var(--tx)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},p.title),
h("span",{className:"scb "+(p.totalScore>=85?"hi":p.totalScore>=60?"md":"lo")},p.totalScore+"/100"),
h("button",{className:"gb",style:{fontSize:"8px",padding:"2px 6px"},onClick:()=>{S.scoringPromptId=p.id;render();}},"Score"),
]));});
}
// Criteria guide
w.append(h("div",{style:{marginTop:"16px",padding:"10px",borderRadius:"8px",background:"var(--card)",border:"1px solid var(--bd)"}},[
h("div",{style:{fontSize:"10px",fontWeight:"700",color:"var(--tx3)",marginBottom:"6px"}},"CRITERIA GUIDE"),
...SCORE_CRITERIA.map(cr=>h("div",{style:{marginBottom:"4px"}},[h("span",{style:{fontWeight:"700",color:"var(--gold)",fontSize:"9px"}},cr.label+": "),h("span",{style:{fontSize:"9px",color:"var(--tx2)"}},cr.desc)]))]));
}

// ═── FINALIZE SUB-TAB (editable master before saving) ──═
if(subView==="finalize"){
w.append(h("div",{className:"bt"},"✏️ Edit & Finalize Master"));
w.append(h("div",{className:"bsub"},"Edit anything below — add notes, change lyrics, tweak tags — then save."));
const titleInput=h("input",{className:"fi",placeholder:"Name this master prompt...",value:"",style:{marginBottom:"10px"}});
const editArea=h("textarea",{className:"fta",rows:"20",style:{fontSize:"11px",minHeight:"300px"}},S.masterDraft||compile());
editArea.addEventListener("input",e=>{S.masterDraft=e.target.value;});
w.append(titleInput);
w.append(editArea);
w.append(h("div",{style:{display:"flex",gap:"6px",marginTop:"10px"}},[
h("button",{className:"gb",style:{flex:1,padding:"14px",fontSize:"14px",fontWeight:"800"},onClick:()=>{saveFinalMaster(editArea.value,titleInput.value);}},"💾 Save Master"),
h("button",{className:"gb",style:{flex:1,padding:"14px"},onClick:()=>cp(editArea.value,"final")},S.copied==="final"?"✓ Copied":"📋 Copy"),
h("button",{className:"ob",style:{padding:"14px"},onClick:()=>{S.view="builder";render();}},"← Back"),
]));
}

app.append(w);}

// ═══ MASTERS ═══
if(S.view==="saved"){
const w=h("div",{className:"mw"},[h("div",{className:"bt"},"⚡ Saved Masters"),h("div",{className:"bsub"},"Ready to deploy anywhere.")]);
if(S.masters.length===0)w.append(h("div",{className:"emp",style:{padding:"70px 16px"}},[h("div",{className:"emp-i"},"⚡"),h("div",{className:"emp-t"},"No masters yet.")]));
else S.masters.forEach(m=>{const det=h("details",{style:{marginTop:"8px"}});det.append(h("summary",{className:"mc-sum"},"View full prompt"),h("pre",{className:"cp-txt"},m.compiled));
w.append(h("div",{className:"mc"},[h("div",{className:"mc-top"},[h("div",{className:"mc-t"},m.title),h("div",{style:{display:"flex",gap:"6px"}},[h("button",{className:"gb",onClick:()=>cp(m.compiled,m.id)},S.copied===m.id?"✓ Copied!":"📋 Copy"),h("button",{className:"ob",onClick:()=>delMaster(m.id)},"🗑️")])]),h("div",{className:"mc-m"},`${m.components.length} blocks · ${new Date(m.created).toLocaleDateString()}`),h("div",{className:"cd-tags"},(m.tags||[]).slice(0,10).map(t=>h("span",{className:"mt"},t))),det]));});
app.append(w);}

updMN();}
